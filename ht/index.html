<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halftone Maker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
        }

        header {
            color: #ccc;
            text-transform: uppercase;
            background-color: #f9f9f9;
            text-align: center;
            margin-bottom: 20px;
            padding: 40px;
        }

        .canvas-wrapper {
            padding-top: 20px;
        }

        .halftone-Canvas {
            border: 1px solid #ccc;
            max-width: 100%;
        }

        .content-wrapper {
            flex: 4;
            display: flex;
            flex-direction: column;
            margin-right: 20px;
            max-height: 100vh;
        }

        .controls-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            padding: 20px;
            background: #f9f9f9;
        }

        .controls-wrapper label {
            display: flex;
            flex-direction: column;
            color: #555;
            position: relative;
        }

        .controls-wrapper label span {
            position: absolute;
            right: 0;
            top: 0;
            color: #333;
        }

        .controls-wrapper input,
        .controls-wrapper select,
        .controls-wrapper button {
            margin-top: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }

        .controls-wrapper input:focus,
        .controls-wrapper select:focus,
        .controls-wrapper button:focus {
            border-color: #888;
            box-shadow: 0 0 4px rgba(136, 136, 136, 0.5);
            outline: none;
            cursor: pointer;
        }

        .controls-wrapper button {
            background: #007BFF;
            color: #fff;
            cursor: pointer;
        }

        .controls-wrapper button:hover {
            background: #0056b3;
        }

        .drop-zone {
            background-color: #d7eaff;
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .drop-zone.dragover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>
    <div class="content-wrapper">
        <!-- <header>
            <h1>Rectangular Halftone Maker</h1>
        </header> -->

        <div class="canvas-wrapper">
            <canvas class="halftone-Canvas" width="1920" height="1080"></canvas>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="drop-zone" id="dropZone">Drag and drop an image here or click to upload</div>
        <label>
            Horizontal Size:
            <input type="range" id="horizontalGridSize" min="2" max="100" value="50" step="0.1">
            <span id="horizontalSizeValue">50</span>
        </label>
        <label>
            Vertical Size:
            <input type="range" id="verticalGridSize" min="2" max="100" value="50" step="0.1">
            <span id="verticalSizeValue">50</span>
        </label>
        <label>
            Gap:
            <input type="range" id="gridLineWidth" min="0.1" max="50" value="5" step="0.1">
            <span id="gapValue">5</span>
        </label>
        <label>
            Brick:
            <select id="brickStyle">
                <option value="none">None</option>
                <option value="horizontal">Horizontal</option>
                <option value="vertical">Vertical</option>
            </select>
        </label>
        <label>
            Brightness:
            <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
            <span id="brightnessValue">0</span>
        </label>
        <label>
            Contrast:
            <input type="range" id="contrast" min="-100" max="100" value="0" step="1">
            <span id="contrastValue">0</span>
        </label>
        <button id="exportPNG">Export PNG</button>
        <button id="exportSVG">Export SVG</button>
    </div>

    <script>
        const canvas = document.querySelector('.halftone-Canvas');
        const ctx = canvas.getContext('2d');
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*, .svg';
            input.onchange = handleImage;
            input.click();
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleImage({ target: { files: e.dataTransfer.files } });
        });

        function handleImage(event) {
            const file = event.target.files[0];
            if (!file) {
                alert('No file selected. Please choose an image file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                img = new Image();
                img.onload = function () {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>

</html>
