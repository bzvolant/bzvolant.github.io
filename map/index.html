<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .filter-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="filter-container">
        <label for="typeFilter">Filter by Type:</label>
        <select id="typeFilter">
            <option value="">All</option>
        </select>
        <label for="timeFilter">Filter by Time:</label>
        <select id="timeFilter">
            <option value="">All</option>
            <option value="1">Last 24 Hours</option>
            <option value="2">Last 2 Days</option>
            <option value="3">Last 3 Days</option>
            <option value="7">Last 7 Days</option>
        </select>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { attributionControl: false }).setView([32.4279, 53.6880], 6);

        L.tileLayer('https://api.maptiler.com/maps/ed349839-de1f-47a1-8141-12b8d65c537d/{z}/{x}/{y}.png?key=dVkwdK2kv8wcYCntB4ni', {
            maxZoom: 18
        }).addTo(map);

        fetch('locations.json')
            .then(response => response.json())
            .then(locations => {
                const uniqueTypes = [...new Set(locations.map(location => location.type))];
                const typeFilterDropdown = document.getElementById('typeFilter');
                const timeFilterDropdown = document.getElementById('timeFilter');

                uniqueTypes.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeFilterDropdown.appendChild(option);
                });

                const updateMap = (filteredLocations) => {
                    map.eachLayer(layer => {
                        if (layer instanceof L.Marker || layer instanceof L.Circle) {
                            map.removeLayer(layer);
                        }
                    });

                    filteredLocations.forEach(location => {
                        const icon = L.icon({
                            iconUrl: `svg/${location.type}.svg`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15],
                            popupAnchor: [0, -15]
                        });

                        const marker = L.marker([location.latitude, location.longitude], { icon }).addTo(map);
                        marker.bindPopup(`<strong>${location.name}</strong><br>${location.notes}`);
                    });
                };

                const filterLocations = () => {
                    const selectedType = typeFilterDropdown.value;
                    const selectedTime = timeFilterDropdown.value;

                    let filteredLocations = locations;

                    if (selectedType) {
                        filteredLocations = filterFeatures(filteredLocations, { type: selectedType });
                    }

                    if (selectedTime) {
                        const daysAgo = parseInt(selectedTime, 10);
                        const cutoffDate = new Date();
                        cutoffDate.setDate(cutoffDate.getDate() - daysAgo);

                        filteredLocations = filteredLocations.filter(location => {
                            const locationDate = new Date(location.timestamp);
                            return locationDate >= cutoffDate;
                        });
                    }

                    const urlParams = new URLSearchParams(window.location.search);
                    if (selectedType) {
                        urlParams.set('type', selectedType);
                    } else {
                        urlParams.delete('type');
                    }

                    if (selectedTime) {
                        urlParams.set('time', selectedTime);
                    } else {
                        urlParams.delete('time');
                    }

                    window.history.replaceState({}, '', `${window.location.pathname}?${urlParams.toString()}`);

                    updateMap(filteredLocations);
                };

                typeFilterDropdown.addEventListener('change', filterLocations);
                timeFilterDropdown.addEventListener('change', filterLocations);

                updateMap(locations);
            });

        function filterFeatures(features, { type }) {
            return features.filter(f => {
                if (type && f.type !== type) return false;
                return true;
            });
        }
    </script>
</body>
</html>
